{% extends "base.html" %}

{% block title %}Edit Customer - Hamza Enterprises{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h2><i class="bi bi-pencil"></i> Edit Customer</h2>
        <hr>
        
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Company Name *</label>
                            <input type="text" class="form-control" name="company_name" value="{{ customer.company_name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Customer Name</label>
                            <input type="text" class="form-control" name="customer_name" value="{{ customer.customer_name or '' }}">
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Phone Number *</label>
                            <input type="text" class="form-control" name="phone" value="{{ customer.phone }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">CNIC</label>
                            <input type="text" class="form-control" name="cnic" value="{{ customer.cnic or '' }}">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" value="{{ customer.email or '' }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" name="address" rows="2">{{ customer.address or '' }}</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Billing Address</label>
                        <textarea class="form-control" name="billing_address" rows="2">{{ customer.billing_address or '' }}</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Shipping Address</label>
                        <textarea class="form-control" name="shipping_address" rows="2">{{ customer.shipping_address or '' }}</textarea>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Sales Tax Number (STN)</label>
                            <input type="text" class="form-control" name="strn" value="{{ customer.strn or '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">NTN Number</label>
                            <input type="text" class="form-control" name="ntn" value="{{ customer.ntn or '' }}">
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('customers') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Update Customer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
